self_serve_channels:
  flow: owning agent wires -> Vulcan QAs (Talos engineers fixes) -> escalate to Daen only on the three triggers
  purpose: Every agent self-serves its own channel/service wiring (Slack, WhatsApp via Beeper, Telegram, Gmail/Google DWD)
    and self-heals routine gateway failures. Each agent owns its own tokens - never shared across agents (token = identity).
  role_chain:
    daen: escalation backstop + final QA - only on (1) blocked/uncovered case, (2) no SOP exists, (3) authorization required
      (new DWD grant, prod config change, token-identity collision)
    owning_agent: wires its own channels + self-heals routine failures (SKILL Section 5); does NOT route wiring to Daen
    talos: engineer-of-record - assists when a wiring hits a technical blocker not covered by the SOP
    vulcan: mandatory QA on every wiring - verifies live openclaw.json / DB / systemd state, never the agent text alone
  skill: gcg-channel-connect
  skill_path: /opt/gcg/shared/skills/gcg-channel-connect/SKILL.md
