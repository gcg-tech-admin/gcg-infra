[Service]
Environment=FLEET_AGENT_NAME=wonhoo
Environment=HOOK_AGENT_ID=wonhoo
Environment=OPENCLAW_CONFIG_PATH=/opt/gcg/openclaw-wonhoo/openclaw.json
Environment=OPENCLAW_STATE_DIR=/opt/gcg/openclaw-wonhoo/state

LoadCredentialEncrypted=op-sa-token:/etc/credstore.encrypted/op-sa-token
LoadCredentialEncrypted=db-env:/etc/credstore.encrypted/db-env
LoadCredentialEncrypted=gateway-env:/etc/credstore.encrypted/gateway-env

RuntimeDirectory=openclaw-wonhoo
RuntimeDirectoryMode=0700

ExecStartPre=
ExecStartPre=/usr/bin/python3 /opt/gcg/shared/scripts/validate-agent-config.py /opt/gcg/openclaw-wonhoo/openclaw.json
ExecStartPre=/opt/gcg/shared/bin/gcg-secret-bootstrap.sh wonhoo
ExecStart=
ExecStart=/bin/bash -c 'set -a; source /run/openclaw-wonhoo/env; exec /usr/bin/openclaw gateway'
