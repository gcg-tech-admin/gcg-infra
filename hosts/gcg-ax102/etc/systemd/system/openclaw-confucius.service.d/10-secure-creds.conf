[Service]
Environment=FLEET_AGENT_NAME=confucius
Environment=HOOK_AGENT_ID=confucius
Environment=OPENCLAW_CONFIG_PATH=/opt/gcg/openclaw-confucius/openclaw.json
Environment=OPENCLAW_STATE_DIR=/opt/gcg/openclaw-confucius/state

LoadCredentialEncrypted=op-sa-token:/etc/credstore.encrypted/op-sa-token
LoadCredentialEncrypted=db-env:/etc/credstore.encrypted/db-env
LoadCredentialEncrypted=gateway-env:/etc/credstore.encrypted/gateway-env

RuntimeDirectory=openclaw-confucius
RuntimeDirectoryMode=0700

ExecStartPre=
ExecStartPre=/usr/bin/python3 /opt/gcg/shared/scripts/validate-agent-config.py /opt/gcg/openclaw-confucius/openclaw.json
ExecStartPre=/opt/gcg/shared/bin/gcg-secret-bootstrap.sh confucius
ExecStart=
ExecStart=/bin/bash -c 'set -a; source /run/openclaw-confucius/env; exec /usr/bin/openclaw gateway'
