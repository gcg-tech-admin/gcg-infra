[Service]
Environment=FLEET_AGENT_NAME=cassandra
Environment=HOOK_AGENT_ID=cassandra
Environment=OPENCLAW_CONFIG_PATH=/opt/gcg/openclaw-cassandra/openclaw.json
Environment=OPENCLAW_STATE_DIR=/opt/gcg/openclaw-cassandra/state

LoadCredentialEncrypted=op-sa-token:/etc/credstore.encrypted/op-sa-token
LoadCredentialEncrypted=db-env:/etc/credstore.encrypted/db-env
LoadCredentialEncrypted=gateway-env:/etc/credstore.encrypted/gateway-env

RuntimeDirectory=openclaw-cassandra
RuntimeDirectoryMode=0700

ExecStartPre=
ExecStartPre=/usr/bin/python3 /opt/gcg/shared/scripts/validate-agent-config.py /opt/gcg/openclaw-cassandra/openclaw.json
ExecStartPre=/opt/gcg/shared/bin/gcg-secret-bootstrap.sh cassandra
ExecStart=
ExecStart=/bin/bash -c 'set -a; source /run/openclaw-cassandra/env; exec /usr/bin/openclaw gateway'
