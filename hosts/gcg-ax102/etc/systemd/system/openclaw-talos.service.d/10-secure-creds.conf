[Service]
ExecStartPre=
ExecStartPre=/usr/bin/python3 /opt/gcg/shared/scripts/validate-agent-config.py /opt/gcg/openclaw-talos/openclaw.json
ExecStartPre=/opt/gcg/shared/bin/gcg-secret-bootstrap.sh talos
LoadCredentialEncrypted=op-sa-token:/etc/credstore.encrypted/op-sa-token
LoadCredentialEncrypted=db-env:/etc/credstore.encrypted/db-env
LoadCredentialEncrypted=gateway-env:/etc/credstore.encrypted/gateway-env
ExecStart=
ExecStart=/bin/bash -c 'set -a; source /run/openclaw-talos/env; exec /usr/bin/openclaw gateway'
